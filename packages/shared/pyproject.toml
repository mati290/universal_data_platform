[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "udp-shared"
version = "0.1.0"
description = "Shared utilities for the Universal Data Platform"
requires-python = ">=3.12"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
