name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: udp
          POSTGRES_USER: udp
          POSTGRES_PASSWORD: udp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U udp -d udp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install shared package and API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
          pip install ../../packages/shared
      - name: Run API tests
        env:
          APP_ENV: ci
          DATABASE_URL: postgresql+psycopg://udp:udp@localhost:5432/udp
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests -q

  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Airflow shared dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r airflow/requirements.txt
          pip install ./packages/shared
      - name: Compile Python sources
        run: python -m compileall apps/api/app airflow/dags packages/shared/src
