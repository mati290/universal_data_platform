name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install shared package and API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ../../packages/shared
      - name: Run API tests
        env:
          APP_ENV: local
        run: pytest tests -q

  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Airflow shared dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r airflow/requirements.txt
          pip install ./packages/shared
      - name: Compile Python sources
        run: python -m compileall apps/api/app airflow/dags packages/shared/src
