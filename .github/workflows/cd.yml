name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_NAME }}.azurecr.io
  API_IMAGE_NAME: udp-api
  AIRFLOW_IMAGE_NAME: udp-airflow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Container Registry login
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push API image
        run: |
          docker build -f apps/api/Dockerfile -t $ACR_LOGIN_SERVER/$API_IMAGE_NAME:${{ github.sha }} .
          docker push $ACR_LOGIN_SERVER/$API_IMAGE_NAME:${{ github.sha }}

      - name: Build and push Airflow image
        run: |
          docker build -f airflow/Dockerfile -t $ACR_LOGIN_SERVER/$AIRFLOW_IMAGE_NAME:${{ github.sha }} .
          docker push $ACR_LOGIN_SERVER/$AIRFLOW_IMAGE_NAME:${{ github.sha }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}

      - name: Render dev image tag
        run: |
          sed -i "s#replace-me.azurecr.io#$ACR_LOGIN_SERVER#g" deploy/kubernetes/overlays/dev/kustomization.yaml
          sed -i "s#replace-me.azurecr.io#$ACR_LOGIN_SERVER#g" deploy/kubernetes/airflow/values-dev.yaml
          sed -i "s/dev-latest/${{ github.sha }}/g" deploy/kubernetes/overlays/dev/kustomization.yaml
          sed -i "s/dev-latest/${{ github.sha }}/g" deploy/kubernetes/airflow/values-dev.yaml

      - name: Deploy API to AKS
        run: kubectl apply -k deploy/kubernetes/overlays/dev

      - name: Deploy Airflow with Helm
        run: |
          helm repo add apache-airflow https://airflow.apache.org
          helm repo update
          helm upgrade --install airflow apache-airflow/airflow \
            --namespace airflow \
            --create-namespace \
            -f deploy/kubernetes/airflow/values-dev.yaml
