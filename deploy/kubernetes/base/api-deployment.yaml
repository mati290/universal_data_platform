apiVersion: apps/v1
kind: Deployment
metadata:
  name: udp-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: udp-api
  template:
    metadata:
      labels:
        app: udp-api
    spec:
      containers:
        - name: api
          image: universal-data-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: udp-api-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: udp-api-secrets
                  key: database-url
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
